# HERMY sample Hermes configuration.
#
# Hermes should use CUA only for GUI/computer-use actions and HERMY's
# local stdio MCP bridge only for Cube-backed code execution.

model:
  provider: openai
  model: gpt-4

mcp_servers:
  cua:
    url: "http://127.0.0.1:8000/mcp"
    timeout: 60
    connect_timeout: 10

  cube:
    command: "hermy-cube-mcp"
    args: []
    timeout: 120
    connect_timeout: 10
    env:
      E2B_API_URL: "http://127.0.0.1:3000"
      E2B_API_KEY: "dummy"
      CUBE_TEMPLATE_ID: "<your-cube-template-id>"
      CUBE_WORKSPACE_DIR: "/workspace"
      HERMY_DEFAULT_TIMEOUT_SECONDS: "60"
      HERMY_MAX_TIMEOUT_SECONDS: "120"
      HERMY_MAX_FILE_WRITE_BYTES: "1000000"
      HERMY_MAX_OUTPUT_BYTES: "200000"
      HERMY_MAX_CODE_BYTES: "200000"
      HERMY_REDACT_TOOL_OUTPUT: "0"
      HERMY_ALLOW_INTERNET: "0"

# Keep host-side Hermes execution disabled. HERMY doctor can verify both this
# text config and vendored Hermes' resolved CLI tool registry.
platform_toolsets:
  cli: ["web", "browser", "vision", "image_gen", "skills", "todo", "memory", "session_search", "clarify", "cua", "cube"]

memory:
  provider: "local"
  path: "./hermes_memory"
